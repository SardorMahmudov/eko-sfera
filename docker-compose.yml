services:
  db:
    image: postgis/postgis:16-3.4
    container_name: toza_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: toza
      POSTGRES_PASSWORD: toza
      POSTGRES_DB: eko_hudud
    ports:
      - "5433:5432"
    volumes:
      - toza_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toza -d eko_hudud"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  toza_db_data:
